# ============================================================
# SentNL — Spam Classification Task Configuration
# Inherits from base.yaml
# ============================================================

task:
  name: "spam"
  display_name: "Spam Detection"
  description: "Binary classification of text as spam or ham"

# --- Dataset ---
dataset:
  path: "datasets/spam/spam.csv"
  text_column: "v2"
  label_column: "v1"
  expected_labels: ["ham", "spam"]
  encoding: "latin-1"
  use_columns: ["v1", "v2"]

# --- Model Candidates ---
models:
  primary:
    name: "MultinomialNB"
    class: "sklearn.naive_bayes.MultinomialNB"
    hyperparameters:
      alpha: [0.1, 0.5, 1.0, 2.0]

  secondary:
    name: "LogisticRegression"
    class: "sklearn.linear_model.LogisticRegression"
    hyperparameters:
      C: [0.01, 0.1, 1.0, 10.0]
      max_iter: [1000]

# --- Vectorizer Override ---
vectorizer:
  max_features: 5000
  ngram_range: [1, 2]

# --- Artifact Paths ---
artifacts:
  model_dir: "models/spam"
