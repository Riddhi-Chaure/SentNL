# ============================================================
# SentNL — Topic Classification Task Configuration
# Inherits from base.yaml
# ============================================================

task:
  name: "topics"
  display_name: "Topic Classification"
  description: "Multi-class classification of text into topic categories (AG News)"

# --- Dataset ---
dataset:
  path: "datasets/topics/test.csv"
  text_column: "Description"
  label_column: "Class Index"
  expected_labels: []  # Dynamic — discovered from data
  # AG News class mapping: 1=World, 2=Sports, 3=Business, 4=Sci/Tech
  class_mapping:
    1: "World"
    2: "Sports"
    3: "Business"
    4: "Sci/Tech"

# --- Model Candidates ---
models:
  primary:
    name: "LinearSVC"
    class: "sklearn.svm.LinearSVC"
    hyperparameters:
      C: [0.01, 0.1, 1.0, 10.0]
      max_iter: [2000]

  secondary:
    name: "LogisticRegression"
    class: "sklearn.linear_model.LogisticRegression"
    hyperparameters:
      C: [0.01, 0.1, 1.0, 10.0]
      max_iter: [1000]

# --- Vectorizer Override ---
vectorizer:
  max_features: 10000
  ngram_range: [1, 2]

# --- Artifact Paths ---
artifacts:
  model_dir: "models/topics"
