# ============================================================
# SentNL — Global Base Configuration
# All task configs inherit from this file.
# ============================================================

project:
  name: "SentNL"
  version: "1.0.0"
  description: "Unified NLP Classification Platform"

# --- Preprocessing Defaults ---
preprocessing:
  lowercase: true
  remove_html: true
  remove_urls: true
  remove_punctuation: true
  normalize_numbers: true
  remove_stopwords: true
  lemmatize: true
  min_token_length: 2

# --- Vectorizer Defaults ---
vectorizer:
  type: "tfidf"
  max_features: 5000
  ngram_range: [1, 2]
  min_df: 2
  max_df: 0.95
  sublinear_tf: true

# --- Training Defaults ---
training:
  test_size: 0.15
  validation_size: 0.15
  random_state: 42
  stratify: true
  cv_folds: 5

# --- Paths ---
paths:
  models_dir: "models"
  reports_dir: "reports"
  logs_dir: "logs"
  datasets_dir: "datasets"
  configs_dir: "configs"

# --- Logging ---
logging:
  level: "INFO"
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"
